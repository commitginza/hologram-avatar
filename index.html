<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hologram Avatar Live TTS</title>
  <link rel="icon" href="./favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main id="appShell" class="app-shell">
    <section id="stage" class="stage" aria-label="Hologram avatar stage"></section>

    <section class="hud" aria-live="polite">
      <div class="hud-kicker">HOLOGRAM AI CONCIERGE</div>
      <div id="subtitle" class="subtitle">開始ボタンを押して、カメラとマイクを許可してください。</div>
      <div id="transcript" class="transcript"></div>
      <div id="status" class="status">idle</div>
    </section>

    <section id="startOverlay" class="start-overlay">
      <div class="start-panel">
        <div class="start-kicker">LIVE TTS MODE</div>
        <h1>ホログラムAIコンシェルジュ</h1>
        <p>
          最初にカメラとマイクを許可してください。人物を検知すると自動で挨拶し、話しかけると音声で応答します。
        </p>
        <button id="startButton" type="button">カメラ・マイクを許可して開始</button>
        <p class="start-note">
          映像・音声は会話処理のために使用します。録音区間だけAPIへ送信します。
        </p>
      </div>
    </section>

    <video id="cameraVideo" class="camera-video" playsinline muted></video>
    <canvas id="cameraProbe" class="camera-probe" width="160" height="120"></canvas>
  </main>

  <script src="./config.js"></script>
  <script type="module" src="./app.js?v=tts-live-v4"></script>
</body>
</html>
