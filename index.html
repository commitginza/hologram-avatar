<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hologram Voice Avatar</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app">
    <section id="stage" aria-label="Hologram avatar stage">
      <div class="grid-layer"></div>
      <div class="vignette"></div>
    </section>

    <div class="subtitle-panel">
      <div class="subtitle-label">HOLOGRAM AI CONCIERGE</div>
      <div id="subtitle" class="subtitle">マイクボタンを押して話しかけてください。</div>
      <div id="transcript" class="transcript"></div>
    </div>

    <div class="mic-panel">
      <button id="micButton" class="mic-button" type="button" aria-label="マイク開始">
        <span class="mic-icon">●</span>
      </button>
      <div id="status" class="status">standby</div>
    </div>
  </main>

  <script src="./config.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./app.js?v=20260709-2"></script>
</body>
</html>
