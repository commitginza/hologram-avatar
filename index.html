<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Webcam Hologram Live Mock</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
</head>
<body>
  <main class="app-shell">
    <section class="stage-card">
      <div id="stage" class="stage" aria-label="webcam hologram stage">
        <div class="status-overlay" id="statusOverlay">
          <div class="status-title">WEBCAM HOLOGRAM</div>
          <div class="status-text" id="statusText">カメラを起動してください</div>
        </div>
      </div>
      <div class="caption" id="captionText">Webカメラ映像をリアルタイムにホログラム風で表示します。</div>
    </section>

    <aside class="panel">
      <h1>Webカメラ<br>ホログラム</h1>
      <p class="note">
        カメラ映像はブラウザ内だけで処理します。サーバー送信・録画はしていません。
      </p>

      <div class="button-row">
        <button id="startBtn" class="primary">カメラ起動</button>
        <button id="stopBtn">停止</button>
      </div>

      <div class="button-row">
        <button id="mockBtn">会話モック再生</button>
        <button id="snapshotBtn">一瞬グリッチ</button>
      </div>

      <label>
        透明度
        <input id="alphaRange" type="range" min="0.10" max="1.00" step="0.01" value="0.76" />
      </label>

      <label>
        白発光
        <input id="glowRange" type="range" min="0.00" max="2.40" step="0.01" value="1.15" />
      </label>

      <label>
        影の濃さ
        <input id="shadowRange" type="range" min="0.00" max="1.00" step="0.01" value="0.38" />
      </label>

      <label>
        スキャンライン
        <input id="scanRange" type="range" min="0.00" max="1.00" step="0.01" value="0.42" />
      </label>

      <label>
        ノイズ
        <input id="noiseRange" type="range" min="0.00" max="1.00" step="0.01" value="0.26" />
      </label>

      <label>
        背景フェード
        <input id="cutRange" type="range" min="0.00" max="0.90" step="0.01" value="0.16" />
      </label>

      <label>
        表示サイズ
        <input id="scaleRange" type="range" min="0.70" max="1.65" step="0.01" value="1.00" />
      </label>

      <label class="check-row">
        <input id="mirrorCheck" type="checkbox" checked />
        左右反転する
      </label>

      <pre id="debugBox">status: standby</pre>
    </aside>
  </main>

  <script type="module" src="./app.js?v=webcam-hologram-1"></script>
</body>
</html>
