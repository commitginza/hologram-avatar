<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Realtime Hologram Avatar</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <main id="stage" class="stage" aria-label="Realtime hologram avatar stage">
    <video id="cameraVideo" class="camera-video" autoplay muted playsinline></video>
    <canvas id="visionCanvas" class="vision-canvas"></canvas>

    <section id="permissionOverlay" class="permission-overlay">
      <div class="permission-card">
        <p class="eyebrow">HOLOGRAM AI CONCIERGE</p>
        <h1>ライブ会話を開始</h1>
        <p>
          カメラとマイクを許可すると、視界に人が入ったタイミングで話しかけ、以降は常時リアルタイムで会話します。
        </p>
        <button id="startButton" type="button">カメラ・マイクを許可して開始</button>
        <p class="note">OpenAI APIキーはLambda側だけで使用します。ブラウザには置きません。</p>
      </div>
    </section>

    <section class="caption-box">
      <p class="eyebrow">HOLOGRAM AI CONCIERGE</p>
      <p id="subtitle" class="subtitle">開始ボタンを押してください。</p>
      <p id="transcript" class="transcript"></p>
    </section>

    <div class="status-panel">
      <span>status: <strong id="status">loading</strong></span>
      <span>presence: <strong id="presenceStatus">standby</strong></span>
    </div>
  </main>

  <script src="./config.js"></script>
  <script type="module" src="./app.js?v=20260711-realtime-v3"></script>
</body>
</html>
