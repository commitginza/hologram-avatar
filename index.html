<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hologram AI Face - Human GLB Mock v2</title>
  <meta name="description" content="Three.jsで作るホログラムAIフェイスのWebモック" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="stage-card" aria-label="Hologram stage">
      <div id="stage" class="stage">
        <div id="bootStatus" class="boot-status" role="status">Three.jsを読み込み中...</div>
      </div>
      <div class="stage-vignette" aria-hidden="true"></div>
      <div class="caption-panel" aria-live="polite">
        <div class="caption-label">HOLOGRAM AI CONCIERGE</div>
        <p id="captionText">待機中です。右側の「会話モック再生」を押してください。</p>
      </div>
    </section>

    <aside class="control-panel">
      <div class="panel-header">
        <p class="eyebrow">Prototype v4</p>
        <h1>Three.js ホログラム顔</h1>
        <p class="lead">人型GLB顔モデルをホログラムシェーダーで表示します。WebGL不可環境ではCanvas 2Dフォールバックで会話モックを動かします。</p>
      </div>

      <div class="button-grid">
        <button id="playBtn" type="button">会話モック再生</button>
        <button id="oneBtn" type="button">1フレーズ再生</button>
        <button id="stopBtn" type="button" class="secondary">停止</button>
      </div>

      <label class="input-label" for="customText">任意テキスト</label>
      <textarea id="customText" rows="4">こんにちは。私は高級腕時計のご相談をサポートするホログラムAIです。ロレックスやパテック フィリップのモデル解説、買取の流れをご案内できます。</textarea>
      <button id="customBtn" type="button" class="wide">任意テキストで発話</button>

      <div class="slider-row">
        <label for="depthRange">顔の立体感</label>
        <input id="depthRange" type="range" min="0.65" max="1.35" value="1" step="0.01" />
      </div>
      <div class="slider-row">
        <label for="glowRange">発光量</label>
        <input id="glowRange" type="range" min="0.65" max="1.55" value="1" step="0.01" />
      </div>
      <div class="slider-row">
        <label for="noiseRange">揺らぎ</label>
        <input id="noiseRange" type="range" min="0" max="1.8" value="0.7" step="0.01" />
      </div>

      <div class="status-box">
        <div><span>status</span><strong id="statusText">standby</strong></div>
        <div><span>intent</span><strong id="intentText">idle</strong></div>
        <div><span>expression</span><strong id="expressionText">neutral</strong></div>
      </div>

      <details open>
        <summary>次にAI APIへつなぐ想定JSON</summary>
        <pre id="jsonPreview"></pre>
      </details>
    </aside>
  </main>

  <noscript>このモックを動かすにはJavaScriptを有効にしてください。</noscript>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.min.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./boot.js?v=20260708-4"></script>
</body>
</html>
